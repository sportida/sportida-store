name: Deploy SPORTIDA Landing

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: sportida-s6764-deploy
  cancel-in-progress: false

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Hostinger via FTP
        id: ftp_deploy_first_try
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: 185.212.71.201
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          server-dir: ./

      - name: Retry deploy to Hostinger via FTP
        if: steps.ftp_deploy_first_try.outcome == 'failure'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: 185.212.71.201
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          server-dir: ./
